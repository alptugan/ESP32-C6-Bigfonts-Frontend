<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Control Panel</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Theme Toggle Switch -->
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="theme-toggle">
            <input type="checkbox" id="theme-toggle" />
            <span class="slider"></span>
        </label>
    </div>

    <div class="card">
        <h2>Device Config</h2>
        <div class="status" id="status-text">Status: <span id="status-val">Disconnected</span></div>

        <button class="btn-connect" id="connect-btn">Connect to Device</button>

        <div class="form-group" id="config-form">
            <div class="input-container">
                <label for="speed-input">Motor Speed:</label>
                <div class="input-row">
                    <input type="number" id="speed-input" placeholder="e.g. 500">
                    <button class="btn-send" id="send-speed-btn" disabled
                        style="width: auto; padding: 0 20px;">Save</button>
                </div>
            </div>

            <div class="input-container">
                <label for="bright-input">LED Brightness (0-255):</label>
                <div class="input-row">
                    <input type="number" id="bright-input" placeholder="e.g. 150" min="0" max="255">
                    <button class="btn-send" id="send-bright-btn" disabled
                        style="width: auto; padding: 0 20px;">Save</button>
                </div>
            </div>

            <div class="input-container">
                <label for="name-input">Name Tag Text:</label>
                <div class="input-row">
                    <input type="text" id="name-input" placeholder="e.g. JOHN DOE" maxlength="20">
                    <button class="btn-send" id="send-name-btn" disabled
                        style="width: auto; padding: 0 20px;">Save</button>
                </div>
            </div>

            <!-- Time Management Container -->
            <div class="time-container">
                <h3>Time Management</h3>

                <!-- First Row: Hour, Minute, Second -->
                <div class="time-row">
                    <div class="time-col">
                        <label for="hour-input">Hour</label>
                        <input type="number" id="hour-input" min="0" max="23" placeholder="HH">
                    </div>
                    <div class="time-col">
                        <label for="minute-input">Minute</label>
                        <input type="number" id="minute-input" min="0" max="59" placeholder="MM">
                    </div>
                    <div class="time-col">
                        <label for="second-input">Second</label>
                        <input type="number" id="second-input" min="0" max="59" placeholder="SS">
                    </div>
                </div>

                <!-- Second Row: Day, Month, Year -->
                <div class="time-row">
                    <div class="time-col">
                        <label for="day-select">Day</label>
                        <div class="combobox-container">
                            <input type="text" id="day-input" placeholder="DD" list="day-options">
                            <datalist id="day-options">
                                <!-- Will be populated dynamically -->
                            </datalist>
                        </div>
                    </div>
                    <div class="time-col">
                        <label for="month-select">Month</label>
                        <div class="combobox-container">
                            <input type="text" id="month-input" placeholder="MM" list="month-options">
                            <datalist id="month-options">
                                <!-- Will be populated dynamically -->
                            </datalist>
                        </div>
                    </div>
                    <div class="time-col">
                        <label for="year-select">Year</label>
                        <div class="combobox-container">
                            <input type="text" id="year-input" placeholder="YYYY" list="year-options">
                            <datalist id="year-options">
                                <!-- Will be populated dynamically -->
                            </datalist>
                        </div>
                    </div>
                </div>

                <!-- Third Row: Day of Week -->
                <div class="time-row">
                    <div class="time-col full-width">
                        <label for="dow-select">Day of Week</label>
                        <select id="dow-select">
                            <option value="1">Sunday</option>
                            <option value="2">Monday</option>
                            <option value="3">Tuesday</option>
                            <option value="4">Wednesday</option>
                            <option value="5">Thursday</option>
                            <option value="6">Friday</option>
                            <option value="7">Saturday</option>
                        </select>
                    </div>
                </div>

                <!-- Save Time Button -->
                <button class="btn-send" id="send-time-btn" disabled style="margin-top: 10px;">Save Time</button>
            </div>

            <div class="confirmation-log" id="log-box"></div>
        </div>
    </div>

    <script>
        // ============================================================================
        // 0. THEME TOGGLE LOGIC
        // ============================================================================
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        // Check local storage for saved preference on load
        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-mode');
            themeToggle.checked = true; // Slide the toggle to the right (Sun)
        }

        // Listen for the toggle switch being flipped
        themeToggle.addEventListener('change', () => {
            if (themeToggle.checked) {
                body.classList.add('light-mode');
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light-mode');
                localStorage.setItem('theme', 'dark');
            }
        });

        // ============================================================================
        // 1. BLE PROTOCOL CONFIGURATION
        // ============================================================================
        const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
        const RX_CHARACTERISTIC_UUID = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";
        const TX_CHARACTERISTIC_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";

        let bleDevice = null;
        let rxCharacteristic = null;
        let txCharacteristic = null;

        // DOM UI Elements References
        const connectBtn = document.getElementById('connect-btn');
        const sendSpeedBtn = document.getElementById('send-speed-btn');
        const sendBrightBtn = document.getElementById('send-bright-btn');
        const sendNameBtn = document.getElementById('send-name-btn');
        const sendTimeBtn = document.getElementById('send-time-btn');
        const speedInput = document.getElementById('speed-input');
        const brightInput = document.getElementById('bright-input');
        const nameInput = document.getElementById('name-input');
        const hourInput = document.getElementById('hour-input');
        const minuteInput = document.getElementById('minute-input');
        const secondInput = document.getElementById('second-input');
        const dayInput = document.getElementById('day-input');
        const monthInput = document.getElementById('month-input');
        const yearInput = document.getElementById('year-input');
        const dowSelect = document.getElementById('dow-select');
        const statusVal = document.getElementById('status-val');
        const statusText = document.getElementById('status-text');
        const configForm = document.getElementById('config-form');
        const logBox = document.getElementById('log-box');

        // Populate Datalists for Day, Month, Year
        function populateDatalists() {
            const dayDatalist = document.getElementById('day-options');
            for (let i = 1; i <= 31; i++) {
                const option = document.createElement('option');
                option.value = i.toString().padStart(2, '0');
                dayDatalist.appendChild(option);
            }

            const monthDatalist = document.getElementById('month-options');
            for (let i = 1; i <= 12; i++) {
                const option = document.createElement('option');
                option.value = i.toString().padStart(2, '0');
                monthDatalist.appendChild(option);
            }

            const yearDatalist = document.getElementById('year-options');
            const currentYear = new Date().getFullYear();
            for (let i = currentYear - 5; i <= currentYear + 10; i++) {
                const option = document.createElement('option');
                option.value = i.toString();
                yearDatalist.appendChild(option);
            }
        }
        populateDatalists();

        // ============================================================================
        // 2. CONNECTION MANAGEMENT
        // ============================================================================
        connectBtn.addEventListener('click', async () => {
            if (bleDevice && bleDevice.gatt.connected) {
                disconnectDevice();
                return;
            }

            try {
                statusVal.textContent = "Searching...";

                // Use namePrefix to bypass ESP32 NVS caching bugs
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'E' }],
                    optionalServices: [SERVICE_UUID]
                });

                statusVal.textContent = "Connecting...";
                const server = await bleDevice.gatt.connect();

                statusVal.textContent = "Fetching Service...";
                const service = await server.getPrimaryService(SERVICE_UUID);

                statusVal.textContent = "Setting up Channels...";
                rxCharacteristic = await service.getCharacteristic(RX_CHARACTERISTIC_UUID);
                txCharacteristic = await service.getCharacteristic(TX_CHARACTERISTIC_UUID);

                // Subscribe to the notification pipeline back from the board
                await txCharacteristic.startNotifications();
                txCharacteristic.addEventListener('characteristicvaluechanged', handleIncomingConfirmation);

                // Request initial state from the device
                // We use sendTaggedValue to ensure it goes through the same pipeline
                await sendTaggedValue('I', ' ');

                // Update UI State to Connected
                statusVal.textContent = "Connected";
                statusText.classList.add('connected');

                // Swap button styling to the 'Disconnect' Danger Red
                connectBtn.classList.add('disconnect-mode');
                connectBtn.textContent = "Disconnect";

                configForm.style.display = "block";

                // Enable the send buttons
                sendSpeedBtn.disabled = false;
                sendBrightBtn.disabled = false;
                sendNameBtn.disabled = false;
                sendTimeBtn.disabled = false;

                bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

            } catch (error) {
                console.error("BLE Error Encountered: ", error);
                resetUI();
            }
        });

        // ============================================================================
        // 3. TARGET EMBEDDED PACKET TRANSMISSION
        // ============================================================================
        sendSpeedBtn.addEventListener('click', () => sendTaggedValue('S', speedInput.value));
        sendBrightBtn.addEventListener('click', () => sendTaggedValue('B', brightInput.value));
        sendNameBtn.addEventListener('click', () => sendTaggedValue('N', nameInput.value));
        sendTimeBtn.addEventListener('click', () => {
            // Format: T,HH,MM,SS,DD,MM,YY,DOW
            // e.g. T12,34,56,05,07,26,1
            const hh = hourInput.value.padStart(2, '0');
            const mm = minuteInput.value.padStart(2, '0');
            const ss = secondInput.value.padStart(2, '0');
            const dd = dayInput.value.padStart(2, '0');
            const mth = monthInput.value.padStart(2, '0');
            const yy = yearInput.value.slice(-2).padStart(2, '0'); // Last 2 digits of year
            const dow = dowSelect.value;

            const timePacket = `${hh},${mm},${ss},${dd},${mth},${yy},${dow}`;
            sendTaggedValue('T', timePacket);
        });

        async function sendTaggedValue(tag, rawValue) {
            const cleanValue = rawValue.trim();
            // Allow empty string for 'I' tag (Initial State Request)
            if (tag !== 'I' && !cleanValue) return;
            if (!rxCharacteristic) return;

            try {
                logBox.style.display = "none";

                // Append single-character routing tag onto data string payload
                const packetString = tag + cleanValue;

                // Transmit text string translated to an array of raw standard bytes
                const encoder = new TextEncoder();
                const data = encoder.encode(packetString);
                await rxCharacteristic.writeValue(data);

                // Clear inputs dynamically following click event execution
                // We no longer clear the inputs so the user can see what they just saved
                // if (tag === 'S') speedInput.value = "";
                // if (tag === 'B') brightInput.value = "";
                // if (tag === 'N') nameInput.value = "";
                // if (tag === 'T') {
                //     hourInput.value = "";
                //     minuteInput.value = "";
                //     secondInput.value = "";
                //     dayInput.value = "";
                //     monthInput.value = "";
                //     yearInput.value = "";
                // }

            } catch (error) {
                alert("Failed to deliver configuration value: " + error);
            }
        }

        // ============================================================================
        // 4. BIDIRECTIONAL RESPONSE PROCESSING
        // ============================================================================
        function handleIncomingConfirmation(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            const confirmationString = decoder.decode(value);

            // Check if this is an Initial State packet (starts with 'I,')
            if (confirmationString.startsWith('I,')) {
                // Format: I,Speed,Brightness,Name,HH,MM,SS,DD,MM,YY,DOW
                const parts = confirmationString.split(',');
                if (parts.length >= 11) {
                    speedInput.value = parts[1];
                    brightInput.value = parts[2];
                    nameInput.value = parts[3];
                    hourInput.value = parts[4];
                    minuteInput.value = parts[5];
                    secondInput.value = parts[6];
                    dayInput.value = parts[7];
                    monthInput.value = parts[8];

                    // Convert 2-digit year back to 4-digit year for the input
                    const yy = parseInt(parts[9], 10);
                    yearInput.value = (2000 + yy).toString();

                    dowSelect.value = parts[10];

                    logBox.textContent = "Device state loaded successfully.";
                    logBox.style.display = "block";
                }
                return;
            }

            // Print the custom text payload sent by the microcontroller directly to our UI box
            logBox.textContent = confirmationString;
            logBox.style.display = "block";
        }

        // ============================================================================
        // 5. TEARDOWN AND HARDWARE DISCONNECT RESET ROUTINES
        // ============================================================================
        function disconnectDevice() {
            if (bleDevice && bleDevice.gatt.connected) {
                bleDevice.gatt.disconnect();
            }
        }

        function onDisconnected() {
            alert("Device link interrupted or disconnected.");
            resetUI();
        }

        function resetUI() {
            statusVal.textContent = "Disconnected";
            statusText.classList.remove('connected');

            // Revert button styling back to the Accent Yellow
            connectBtn.classList.remove('disconnect-mode');
            connectBtn.textContent = "Connect to Device";

            configForm.style.display = "none";
            logBox.style.display = "none";

            // Disable the send buttons
            sendSpeedBtn.disabled = true;
            sendBrightBtn.disabled = true;
            sendNameBtn.disabled = true;
            sendTimeBtn.disabled = true;

            bleDevice = null;
            rxCharacteristic = null;
            txCharacteristic = null;
        }
    </script>

</body>

</html>
